<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼豆像素画生成器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #e0e0e0; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }
  header {
    width: 100%; padding: 24px 20px 16px; text-align: center;
    background: linear-gradient(135deg, #16213e, #0f3460);
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  header h1 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(90deg, #e94560, #f5a623);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  header p { font-size: 14px; color: #8899aa; margin-top: 4px; }

  .container { width: 100%; max-width: 900px; padding: 24px 20px 40px; }

  /* Upload area */
  .upload-zone {
    border: 2px dashed rgba(255,255,255,.2);
    border-radius: 16px; padding: 48px 24px;
    text-align: center; cursor: pointer;
    transition: all .25s;
    background: rgba(255,255,255,.02);
    position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: #e94560; background: rgba(233,69,96,.06);
  }
  .upload-zone.has-image { padding: 0; border: none; background: none; }
  .upload-zone .icon { font-size: 48px; color: #555; margin-bottom: 12px; }
  .upload-zone h2 { font-size: 18px; font-weight: 600; color: #ccc; }
  .upload-zone p { font-size: 13px; color: #667; margin-top: 6px; }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .upload-zone.has-image input[type=file] { display: none; }

  /* Preview area */
  .preview-area { margin-top: 0; display: none; }
  .preview-area.visible { display: block; animation: fadeUp .35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .preview-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    margin-top: 24px;
  }
  .preview-card {
    background: rgba(255,255,255,.04);
    border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(255,255,255,.08);
  }
  .preview-card .label {
    padding: 10px 14px; font-size: 13px; font-weight: 600;
    color: #8899aa; border-bottom: 1px solid rgba(255,255,255,.06);
    display: flex; align-items: center; gap: 8px;
  }
  .preview-card .canvas-wrap {
    display: flex; align-items: center; justify-content: center;
    padding: 12px; min-height: 240px;
    background: repeating-conic-gradient(rgba(255,255,255,.03) 0% 25%, transparent 0% 50%) 0 0 / 20px 20px;
  }
  .preview-card canvas { max-width: 100%; max-height: 400px; border-radius: 4px; }

  /* Controls */
  .controls {
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
    margin-top: 20px; padding: 16px 20px;
    background: rgba(255,255,255,.04);
    border-radius: 12px; border: 1px solid rgba(255,255,255,.06);
  }
  .controls label { font-size: 13px; color: #8899aa; white-space: nowrap; }
  .controls input[type=range] {
    -webkit-appearance: none; width: 140px; height: 4px;
    background: #333; border-radius: 2px; outline: none;
  }
  .controls input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: #e94560; cursor: pointer;
    border: 2px solid #1a1a2e;
  }
  .controls .value { font-size: 15px; font-weight: 700; color: #e94560; min-width: 28px; text-align: center; }
  .controls .btn-group { display: flex; gap: 8px; margin-left: auto; }
  .btn {
    padding: 10px 22px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-primary:hover { background: #d63850; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(233,69,96,.35); }
  .btn-secondary { background: rgba(255,255,255,.08); color: #ccc; }
  .btn-secondary:hover { background: rgba(255,255,255,.12); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  /* Color palette strip */
  .palette-strip { margin-top: 16px; display: none; }
  .palette-strip.visible { display: block; }
  .palette-strip .title { font-size: 12px; color: #667; margin-bottom: 8px; }
  .palette-colors {
    display: flex; flex-wrap: wrap; gap: 4px;
    max-height: 60px; overflow-y: auto;
  }
  .palette-colors .swatch {
    width: 22px; height: 22px; border-radius: 4px;
    border: 1px solid rgba(255,255,255,.1); flex-shrink: 0;
    position: relative; cursor: pointer;
  }
  .palette-colors .swatch:hover::after {
    content: attr(data-name); position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px;
    white-space: nowrap; z-index: 10;
  }

  /* Footer */
  footer {
    margin-top: 32px; text-align: center; font-size: 12px; color: #445;
    width: 100%; padding: 20px;
  }

  /* Responsive */
  @media (max-width: 640px) {
    .preview-grid { grid-template-columns: 1fr; }
    .controls { flex-direction: column; align-items: stretch; }
    .controls .btn-group { margin-left: 0; }
    .controls input[type=range] { width: 100%; }
    header h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<header>
  <h1>🧩 拼豆像素画</h1>
  <p>上传图片 → 一键转成拼豆图纸 → 下载开拼</p>
</header>

<div class="container">
  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <div class="icon">🖼️</div>
    <h2>拖入图片，或点击选择</h2>
    <p>支持 JPG / PNG / WebP</p>
    <input type="file" accept="image/*" id="fileInput">
  </div>

  <!-- Preview -->
  <div class="preview-area" id="previewArea">
    <div class="preview-grid">
      <div class="preview-card">
        <div class="label">📷 原图</div>
        <div class="canvas-wrap" id="originalWrap">
          <canvas id="originalCanvas"></canvas>
        </div>
      </div>
      <div class="preview-card">
        <div class="label">🧩 像素图纸</div>
        <div class="canvas-wrap" id="resultWrap">
          <canvas id="resultCanvas"></canvas>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <label>格子数</label>
      <input type="range" id="gridSize" min="12" max="64" value="32">
      <span class="value" id="gridValue">32</span>
      <div class="btn-group">
        <button class="btn btn-secondary" id="resetBtn">🔄 重选</button>
        <button class="btn btn-primary" id="downloadBtn">⬇️ 下载图纸</button>
      </div>
    </div>

    <!-- Palette -->
    <div class="palette-strip" id="paletteStrip">
      <div class="title">使用到的颜色（悬停看色名）</div>
      <div class="palette-colors" id="paletteColors"></div>
    </div>
  </div>
</div>

<footer>上传即代表您拥有图片版权 · 所有处理均在本地完成</footer>

<script>
// ─── Perler Bead Color Palette ──────────────────────────────
const PALETTE = [
  { name: '白', hex: '#ffffff' },
  { name: '奶油', hex: '#fcf3d4' },
  { name: '浅黄', hex: '#fce68a' },
  { name: '黄', hex: '#fad714' },
  { name: '金黄', hex: '#f5a623' },
  { name: '橙色', hex: '#f5a113' },
  { name: '桔红', hex: '#ef7e1a' },
  { name: '红', hex: '#e94560' },
  { name: '深红', hex: '#c41e3a' },
  { name: '酒红', hex: '#8b1a2b' },
  { name: '粉红', hex: '#f8a4b8' },
  { name: '浅粉', hex: '#fcc9d4' },
  { name: '紫', hex: '#9b59b6' },
  { name: '深紫', hex: '#6c3483' },
  { name: '淡紫', hex: '#c39bd3' },
  { name: '浅蓝', hex: '#85c1e9' },
  { name: '天蓝', hex: '#3498db' },
  { name: '蓝', hex: '#2980b9' },
  { name: '深蓝', hex: '#1a5276' },
  { name: '藏青', hex: '#0b3d5c' },
  { name: '青', hex: '#1abc9c' },
  { name: '薄荷', hex: '#76d7c4' },
  { name: '绿', hex: '#27ae60' },
  { name: '草绿', hex: '#7dcea0' },
  { name: '深绿', hex: '#1e8449' },
  { name: '橄榄', hex: '#5b7d3a' },
  { name: '棕色', hex: '#8b6914' },
  { name: '深棕', hex: '#6e4f1e' },
  { name: '浅棕', hex: '#b8956a' },
  { name: '米色', hex: '#d4b895' },
  { name: '灰', hex: '#95a5a6' },
  { name: '中灰', hex: '#717d7e' },
  { name: '深灰', hex: '#515a5a' },
  { name: '炭灰', hex: '#2c3e50' },
  { name: '黑', hex: '#1a1a1a' },
  { name: '肤色', hex: '#f5cba7' },
  { name: '珊瑚', hex: '#e59866' },
  { name: '深粉', hex: '#e74c6f' },
  { name: '靛蓝', hex: '#4a6fa5' },
  { name: '浅绿', hex: '#a9dfbf' },
];

// ─── DOM refs ───────────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const previewArea = document.getElementById('previewArea');
const origCanvas = document.getElementById('originalCanvas');
const resultCanvas = document.getElementById('resultCanvas');
const gridSlider = document.getElementById('gridSize');
const gridValue = document.getElementById('gridValue');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');
const paletteStrip = document.getElementById('paletteStrip');
const paletteColors = document.getElementById('paletteColors');

let sourceImage = null;

// ─── Color matching ─────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

const paletteRgb = PALETTE.map(c => ({ ...c, rgb: hexToRgb(c.hex) }));

function nearestColor(r, g, b) {
  let best = paletteRgb[0];
  let bestDist = Infinity;
  for (const c of paletteRgb) {
    const dr = r - c.rgb[0], dg = g - c.rgb[1], db = b - c.rgb[2];
    const dist = dr*dr + dg*dg + db*db;
    if (dist < bestDist) { bestDist = dist; best = c; }
  }
  return best;
}

// ─── Image processing ────────────────────────────────────────
function processImage(img) {
  const grid = parseInt(gridSlider.value);
  gridValue.textContent = grid;

  // Draw original (fit to card width)
  const origCtx = origCanvas.getContext('2d');
  const cardW = document.getElementById('originalWrap').clientWidth - 24 || 380;
  const scale = Math.min(cardW / img.width, 360 / img.height, 1);
  const dispW = Math.round(img.width * scale);
  const dispH = Math.round(img.height * scale);
  origCanvas.width = dispW;
  origCanvas.height = dispH;
  origCtx.drawImage(img, 0, 0, dispW, dispH);

  // Sample pixels
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  tempCanvas.width = grid;
  tempCanvas.height = grid;
  tempCtx.drawImage(img, 0, 0, grid, grid);
  const imageData = tempCtx.getImageData(0, 0, grid, grid);
  const { data } = imageData;

  // Map to palette & collect used colors
  const usedColors = new Map();
  const pixels = [];
  for (let i = 0; i < grid * grid; i++) {
    const idx = i * 4;
    const r = data[idx], g = data[idx+1], b = data[idx+2];
    const matched = nearestColor(r, g, b);
    pixels.push(matched);
    if (!usedColors.has(matched.hex)) usedColors.set(matched.hex, matched);
  }

  // Render result with bead-like appearance
  const cellSize = 16;
  const gap = 1;
  const padding = 12;
  const size = grid * cellSize + (grid - 1) * gap + padding * 2;
  resultCanvas.width = size;
  resultCanvas.height = size;
  const ctx = resultCanvas.getContext('2d');

  // Background
  ctx.fillStyle = '#2a2a3e';
  ctx.fillRect(0, 0, size, size);

  // Bead grid
  for (let row = 0; row < grid; row++) {
    for (let col = 0; col < grid; col++) {
      const p = pixels[row * grid + col];
      const x = padding + col * (cellSize + gap);
      const y = padding + row * (cellSize + gap);
      ctx.fillStyle = p.hex;
      // Slightly rounded bead shape
      ctx.beginPath();
      ctx.arc(x + cellSize/2, y + cellSize/2, cellSize/2 - 1, 0, Math.PI * 2);
      ctx.fill();
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,.15)';
      ctx.beginPath();
      ctx.arc(x + cellSize/2 - 2, y + cellSize/2 - 2, cellSize/4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Update palette strip
  paletteColors.innerHTML = '';
  const sorted = [...usedColors.values()].sort((a, b) => {
    const [r1,g1,b1] = a.rgb, [r2,g2,b2] = b.rgb;
    return (r1*299+g1*587+b1*114) - (r2*299+g2*587+b2*114);
  });
  sorted.forEach(c => {
    const div = document.createElement('div');
    div.className = 'swatch';
    div.style.background = c.hex;
    div.dataset.name = c.name;
    paletteColors.appendChild(div);
  });
  paletteStrip.classList.add('visible');
}

// ─── High-res download ───────────────────────────────────────
function downloadPattern() {
  const grid = parseInt(gridSlider.value);
  const cellSize = 20;
  const gap = 1.5;
  const padding = 20;
  const legendW = 120;
  const size = grid * cellSize + (grid - 1) * gap + padding * 2;

  // Sample
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  tempCanvas.width = grid;
  tempCanvas.height = grid;
  tempCtx.drawImage(sourceImage, 0, 0, grid, grid);
  const data = tempCtx.getImageData(0, 0, grid, grid).data;

  const usedMap = new Map();
  const pixels = [];
  for (let i = 0; i < grid * grid; i++) {
    const idx = i * 4;
    const p = nearestColor(data[idx], data[idx+1], data[idx+2]);
    pixels.push(p);
    if (!usedMap.has(p.hex)) usedMap.set(p.hex, p);
  }

  const used = [...usedMap.values()];
  const legendHeight = used.length > 0 ? used.length * 22 + 30 : 0;
  const totalW = size + legendW + 40;
  const totalH = Math.max(size, legendHeight) + padding * 2;

  const canvas = document.createElement('canvas');
  canvas.width = totalW;
  canvas.height = totalH;
  const ctx = canvas.getContext('2d');

  // White bg
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, totalW, totalH);

  // Title
  ctx.fillStyle = '#333';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('拼豆图纸 — 格子数: ' + grid + '×' + grid, padding, 30);

  // Bead grid
  for (let row = 0; row < grid; row++) {
    for (let col = 0; col < grid; col++) {
      const p = pixels[row * grid + col];
      const x = padding + col * (cellSize + gap);
      const y = padding + 40 + row * (cellSize + gap);
      ctx.fillStyle = p.hex;
      ctx.beginPath();
      ctx.arc(x + cellSize/2, y + cellSize/2, cellSize/2 - 1, 0, Math.PI * 2);
      ctx.fill();
      // thin border
      ctx.strokeStyle = 'rgba(0,0,0,.12)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(x + cellSize/2, y + cellSize/2, cellSize/2 - 1, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // Legend
  if (used.length > 0) {
    const lx = size + padding + 24;
    let ly = padding + 40;
    ctx.fillStyle = '#333';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('颜色清单', lx, ly);
    ly += 20;
    used.forEach(c => {
      ctx.fillStyle = c.hex;
      ctx.fillRect(lx, ly, 16, 16);
      ctx.strokeStyle = 'rgba(0,0,0,.15)';
      ctx.strokeRect(lx, ly, 16, 16);
      ctx.fillStyle = '#333';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(c.name, lx + 22, ly + 13);
      ly += 22;
    });
  }

  // Download
  const link = document.createElement('a');
  link.download = `拼豆图纸_${grid}x${grid}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ─── Events ──────────────────────────────────────────────────
function loadImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      uploadZone.classList.add('has-image');
      previewArea.classList.add('visible');
      uploadZone.querySelector('h2').textContent = '📸 ' + file.name;
      uploadZone.querySelector('p').textContent = (img.width + '×' + img.height) + ' · 点击重新选择';
      processImage(img);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

fileInput.addEventListener('change', e => {
  if (e.target.files.length) loadImage(e.target.files[0]);
});

// Drag and drop
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]);
});

// Click to re-select when image is loaded
uploadZone.querySelector('input').addEventListener('click', function(e) {
  if (sourceImage) { /* allow re-select */ }
});

gridSlider.addEventListener('input', () => {
  if (sourceImage) processImage(sourceImage);
});

downloadBtn.addEventListener('click', () => {
  if (sourceImage) downloadPattern();
});

resetBtn.addEventListener('click', () => {
  sourceImage = null;
  uploadZone.classList.remove('has-image');
  previewArea.classList.remove('visible');
  paletteStrip.classList.remove('visible');
  uploadZone.querySelector('h2').textContent = '拖入图片，或点击选择';
  uploadZone.querySelector('p').textContent = '支持 JPG / PNG / WebP';
});

// Window resize
window.addEventListener('resize', () => {
  if (sourceImage) processImage(sourceImage);
});
</script>
</body>
</html>
